# General
set -g mouse on

## Start window and pane indexes from 1
set -g base-index 1
set -g pane-base-index 1

## Palette
set -g @col_inactive "colour7"
set -g @col_icon_cur "colour4"
set -g @col_name_cur "colour15"
set -g @col_zoom "colour3"
set -g @col_border "colour8"

## Terminal/Colors
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

## Status bar
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=default,fg=#{@col_inactive}"
set -g status-left ""
set -g status-right ""

## Windows
set -g window-status-format "#[fg=#{@col_inactive}]󰴲 #W"
set -g window-status-current-format "#[fg=#{?window_zoomed_flag,#{@col_zoom},#{@col_icon_cur}}]󱡓 #[fg=#{@col_name_cur},bold]#W"
set -g window-status-style "bg=default,nobold"
set -g window-status-current-style "bg=default"
set -g window-status-bell-style "fg=colour1,nobold"

## Panes
set -g pane-border-lines simple
set -g pane-border-style "fg=#{@col_border}"
set -g pane-active-border-style "fg=#{@col_icon_cur}"

# Keybinds

## Prefix
set -g prefix C-a
bind-key C-a send-prefix

## Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

## Selection
bind-key Up select-pane -U
bind-key Down select-pane -D
bind-key Left select-pane -L
bind-key Right select-pane -R

## Resizing
bind -r S-Up resize-pane -U
bind -r S-Down resize-pane -D
bind -r S-Left resize-pane -L
bind -r S-Right resize-pane -R

## Zoom toggle
bind F resize-pane -Z

## Kill pane without confirmation message
bind-key x kill-pane

## Splits
bind h split-window -h
bind v split-window -v

## Choose window
bind f choose-window -Z
